<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header">
                    <h4>My Profile</h4>
                </div>
                <div class="card-body text-center">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    <img th:if="${user.profileImage != null}" th:src="${user.profileImage}"
                         class="rounded-circle mb-3" width="120" height="120" alt="Profile Image" style="object-fit:cover;">
                    <img th:unless="${user.profileImage != null}"
                         src="https://via.placeholder.com/120"
                         class="rounded-circle mb-3" width="120" height="120" alt="Default Profile">
                    <h4 th:text="${user.username}">Username</h4>
                    <p class="text-muted" th:text="${user.email}">email@example.com</p>
                    <div class="mb-3">
                        <span th:each="role : ${user.roles}" class="badge bg-primary me-1" th:text="${role}">ROLE</span>
                    </div>
                    <hr>
                    <h5>Upload Profile Image</h5>
                    <form th:action="@{/profile/upload-image}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload Image</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
