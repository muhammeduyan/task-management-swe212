<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>Welcome, <span sec:authentication="name">User</span>!</h2>
            <p class="text-muted">Task Management System</p>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <div class="card border-primary">
                <div class="card-body">
                    <h5 class="card-title text-primary">Employees</h5>
                    <p class="card-text">Manage employee records.</p>
                    <a th:href="@{/employees}" class="btn btn-primary">View Employees</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border-success">
                <div class="card-body">
                    <h5 class="card-title text-success">Tasks</h5>
                    <p class="card-text">Manage task definitions.</p>
                    <a th:href="@{/tasks}" class="btn btn-success">View Tasks</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border-warning">
                <div class="card-body">
                    <h5 class="card-title text-warning">Assignments</h5>
                    <p class="card-text">Manage task assignments.</p>
                    <a th:href="@{/taskers}" class="btn btn-warning">View Assignments</a>
                </div>
            </div>
        </div>
    </div>
    <div class="row mt-2" sec:authorize="hasRole('ADMIN')">
        <div class="col-md-4 mb-3">
            <div class="card border-danger">
                <div class="card-body">
                    <h5 class="card-title text-danger">User Management</h5>
                    <p class="card-text">Admin: manage all users.</p>
                    <a th:href="@{/admin/users}" class="btn btn-danger">Manage Users</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
