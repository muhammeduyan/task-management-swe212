<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Assignment' : 'New Assignment'">Assignment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header">
                    <h4 th:text="${isEdit} ? 'Edit Assignment' : 'New Assignment'">Assignment</h4>
                </div>
                <div class="card-body">
                    <form th:action="${isEdit} ? @{/taskers/edit/{id}(id=${taskerId})} : @{/taskers/new}"
                          th:object="${tasker}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Employee</label>
                            <select th:field="*{employeeId}" class="form-select" required>
                                <option value="">-- Select Employee --</option>
                                <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}"></option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Task</label>
                            <select th:field="*{taskId}" class="form-select" required>
                                <option value="">-- Select Task --</option>
                                <option th:each="task : ${tasks}" th:value="${task.id}" th:text="${task.name}"></option>
                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('taskId')}" th:errors="*{taskId}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" th:field="*{taskDate}" class="form-control" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('taskDate')}" th:errors="*{taskDate}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Time</label>
                            <input type="time" th:field="*{taskTime}" class="form-control" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('taskTime')}" th:errors="*{taskTime}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning" th:text="${isEdit} ? 'Update' : 'Create'">Save</button>
                            <a th:href="@{/taskers}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
